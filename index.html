<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIROB HOSTING WEB | ALL-IN-ONE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ff0055; }
        body { background: #000; color: var(--accent); transition: 0.5s; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        .spin { animation: rotate 4s linear infinite; border: 3px solid var(--accent); box-shadow: 0 0 40px var(--accent); }
        @keyframes rotate { 100% { transform: rotateY(360deg); } }
        .card { background: rgba(5, 5, 5, 0.95); border: 1px solid var(--accent); border-radius: 40px; backdrop-filter: blur(10px); }
        
        /* Input Fix: Removing forced uppercase and styling */
        input { 
            border-color: var(--accent) !important; 
            color: #fff !important; 
            text-transform: none !important; /* ছোট হাতের লেখা অ্যালাউ করবে */
        }
        
        #dashboard { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-8">

    <div id="music-player"></div>

    <div id="login-box" class="flex flex-col items-center justify-center min-h-[90vh]">
        <div class="spin w-24 h-24 rounded-full mb-12 flex items-center justify-center text-4xl">😈</div>
        <div class="card p-12 w-96 text-center shadow-2xl">
            <h1 class="text-[10px] font-black tracking-[8px] mb-10 uppercase opacity-60">Authentication Required</h1>
            <input type="password" id="passkey" placeholder="ENTER PIN" 
                   class="w-full bg-transparent border-b border-gray-800 py-3 text-center outline-none mb-12 tracking-[15px] focus:border-[var(--accent)] text-xl">
            <button onclick="checkAuth()" style="background: var(--accent)" 
                    class="w-full text-black font-black py-5 rounded-3xl uppercase tracking-widest hover:brightness-125 transition">Authorize</button>
            <p id="login-error" class="text-red-500 text-[10px] mt-4 hidden uppercase font-bold">Access Denied!</p>
        </div>
    </div>

    <div id="dashboard" class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-20">
            <h1 class="text-3xl font-black italic tracking-tighter uppercase">Nirob-Hosting-Web</h1>
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-3">
                    <span class="text-[10px] font-bold opacity-50">THEME</span>
                    <input type="color" value="#ff0055" onchange="document.documentElement.style.setProperty('--accent', this.value)" 
                           class="w-10 h-10 bg-transparent cursor-pointer border-none">
                </div>
                <button onclick="location.reload()" class="text-xs text-red-600 font-bold border border-red-900 px-6 py-2 rounded-full hover:bg-red-600 hover:text-white transition uppercase">Logout</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-16">
            <div class="card p-12 text-center border-t-8 shadow-2xl" style="border-top-color: var(--accent)">
                <h2 class="text-xs font-bold mb-10 tracking-[5px] uppercase opacity-40">Host Project</h2>
                <div class="space-y-8">
                    <input type="text" id="p_name" placeholder="filename.py / index.html" 
                           class="w-full bg-black border border-gray-900 p-5 rounded-3xl text-sm outline-none text-center">
                    
                    <div class="border-2 border-dashed border-gray-900 p-12 rounded-[40px] hover:border-[var(--accent)] transition cursor-pointer relative">
                        <input type="file" id="zip_file" accept=".zip, .py, .html" class="opacity-0 absolute inset-0 cursor-pointer">
                        <p id="file-label" class="text-[10px] opacity-40 uppercase font-bold">Select ZIP or File</p>
                    </div>

                    <button onclick="startDeploy()" style="background: var(--accent)" 
                            class="w-full text-black font-black py-6 rounded-3xl text-xs uppercase shadow-2xl hover:scale-105 transition duration-300">
                        Launch Instance →
                    </button>
                </div>
            </div>

            <div class="space-y-8">
                <h3 class="text-xs font-black opacity-30 uppercase tracking-[10px] mb-8">Live Status</h3>
                <div id="status-container">
                    <div class="card p-16 text-center opacity-20 italic border-dashed uppercase text-xs tracking-widest">
                        Waiting for deployment...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Authentication Logic (From app.py: SECRET_PASS = "NIROB")
        function checkAuth() {
            const pass = document.getElementById('passkey').value;
            if (pass.toUpperCase() === "NIROB") {
                // Play music from your index.html link
                document.getElementById('music-player').innerHTML = `
                    <iframe src="https://www.youtube.com/embed/PjS_9_1B_P0?autoplay=1&loop=1&playlist=PjS_9_1B_P0" style="display:none" allow="autoplay"></iframe>
                `;
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else {
                const error = document.getElementById('login-error');
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2000);
            }
        }

        // Deployment Logic (Simulation of app.py behavior)
        function startDeploy() {
            const name = document.getElementById('p_name').value;
            const file = document.getElementById('zip_file').files[0];

            if (!name || !file) {
                alert("Please enter a filename and select a file!");
                return;
            }

            const statusContainer = document.getElementById('status-container');
            
            // Adding a live node card (Same to same design)
            statusContainer.innerHTML = `
                <div class="card p-10 border-r-8 shadow-lg mb-4 animate-pulse" style="border-right-color: var(--accent)">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-black text-2xl italic uppercase tracking-tighter"># ${name}</p>
                            <p class="text-[10px] mt-3 opacity-50 uppercase font-bold tracking-widest text-green-400">Status: Running Online</p>
                            <p class="text-[8px] mt-1 opacity-30 uppercase">Time Remaining: 120 Minutes</p>
                        </div>
                        <div class="text-right">
                            <div class="w-4 h-4 bg-green-500 rounded-full animate-ping mx-auto"></div>
                            <p class="text-[10px] font-black mt-2 text-green-500 uppercase">Live</p>
                        </div>
                    </div>
                </div>
            `;
            
            alert("Success: " + name + " has been deployed successfully!");
        }

        // Display selected filename
        document.getElementById('zip_file').addEventListener('change', function(e) {
            const label = document.getElementById('file-label');
            label.innerText = e.target.files[0] ? e.target.files[0].name : "Select ZIP Package";
            label.style.opacity = "1";
            label.style.color = "var(--accent)";
        });
    </script>
</body>
</html>
